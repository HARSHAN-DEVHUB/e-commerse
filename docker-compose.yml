services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ecommerce']
      interval: 5s
      timeout: 3s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce?schema=public
      JWT_SECRET: compose-access-secret
      JWT_REFRESH_SECRET: compose-refresh-secret
      JWT_EXPIRES_IN: 15m
      AUTH_RATE_LIMIT_MAX: 30
      WRITE_RATE_LIMIT_MAX: 120
      LOG_LEVEL: info
    ports:
      - '5000:5000'

volumes:
  postgres_data:
